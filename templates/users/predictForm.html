{% extends 'users/userbase.html' %}
{% block contents %}

<!DOCTYPE html>
  <html>
  <style>
  input[type=text], select {
    width: 100%;
    padding: 12px 20px;
    margin: 8px 0;
    display: inline-block;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  input[type=submit] {
    width: 100%;
    background-color: #4CAF50;
    color: white;
    padding: 14px 20px;
    margin: 8px 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  input[type=submit]:hover {
    background-color: #45a049;
  }
  
  .formDiv {
    margin: 0 200px;
    border-radius: 5px;
    background-color: #f2f2f2;
    padding: 20px;
  }
  </style>

<body>
    <div class="formDiv">
<h2 align="center" style="color:rgb(50, 19, 190);font-weight:bold;">Suggested_Job_Role: {{ predict }}</h2>
<form action="" method="POST">
    {% csrf_token %}
<center>

    <label>hackathons:</label>
    <input type="text" id="hackathons" name="hackathons" required><br>

    <label>codingskillsrating:</label>
    <input type="text" id="codingskillsrating" name="codingskillsrating" required><br>

    <label>certifications:</label>
    <input type="text" id="certifications" name="certifications" required><br>

    <label>talentteststaken:</label>
    <input type="text" id="talentteststaken" name="talentteststaken" required><br>

    <label>olympiads:</label>
    <input type="text" id="olympiads" name="olympiads" required><br>

    <label>memorycapabilityscore:</label>
    <input type="text" id="memorycapabilityscore" name="memorycapabilityscore" required><br>

    <label>Interestedsubjects:</label>
    <input type="text" id="Interestedsubjects" name="Interestedsubjects" required><br>

    <label>Typeofcompanywanttosettlein:</label>
    <input type="text" id="Typeofcompanywanttosettlein" name="Typeofcompanywanttosettlein" required><br>

    <label>ManagementorTechnical:</label>
    <input type="text" id="ManagementorTechnical" name="ManagementorTechnical" required><br>

    <label>workedinteamsever:</label>
    <input type="text" id="workedinteamsever" name="workedinteamsever" required><br>
 

    <input type="submit" value="submit">
</center>
</div>
</body>
</html>

{% endblock %}
